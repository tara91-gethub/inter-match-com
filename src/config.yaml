site:
  name: 'The Matchmaking Bureau'
  site: 'https://matchmakingbureau.co.nz'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: false

metadata:
  title:
    default: 'The Matchmaking Bureau | Private Matchmaking New Zealand'
    template: '%s | The Matchmaking Bureau NZ'
  description: 'Private matchmaking for discerning singles across Auckland, Wellington, Christchurch and Queenstown. The Matchmaking Bureau is where exceptional people connect.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'The Matchmaking Bureau'
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/blog/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: true
        follow: true
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark:only'
